<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- connect tailwind css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <title>Job Application Tracker</title>
    <style>
    *{
        font-family: "Geist", sans-serif;
    }
        body {
            background-color: #f8fafc;
        }
    </style>
</head>

<body>
    <!-- header section -->
    <header class="w-[80%] mx-auto border-b-2 border-b-[#ebebed]">
        <h1 class="text-3xl text-[#002C5C] font-bold my-6">Job Application Tracker</h1>
        <div class="grid grid-cols-3 gap-5 mb-7">
            <div class="bg-[#ffffff] p-5 rounded-xl border-[#f4f5f6] border-2">
                <p class="text-[#323B49] font-medium">Total</p>
                <p class="text-[#002c5c] font-bold text-2xl">8</p>
            </div>
            <div class="bg-[#ffffff] p-5 rounded-xl border-[#f4f5f6] border-2">
                <p class="text-[#323B49] font-medium">Interview</p>
                <p class="text-[#5acea8] font-bold text-2xl">0</p>
            </div>
            <div class="bg-[#ffffff] p-5 rounded-xl border-[#f4f5f6] border-2">
                <p class="text-[#323B49] font-medium">Rejected</p>
                <p class="text-[#ef4444] font-bold text-2xl">0</p>
            </div>
        </div>
    </header>

    <main class="w-[80%] mx-auto">
        <div class="flex justify-between my-6">
            <p class="text-xl text-[#002c5c] font-semibold">Available Jobs</p>
            <p class="font-medium text-[#adb1b8]">8 jobs</p>
        </div>
        <div class="flex gap-3">
            <button class="bg-[#3b82f6] border-[#f4f5f6] border font-semibold rounded-md text-[#ffffff] px-7 py-2">All</button>
            <button class="bg-[#ffffff] border-[#f4f5f6] border font-medium rounded-md text-[#64748b] px-7 py-2" >Interview</button>
            <button class="bg-[#ffffff] border-[#f4f5f6] border font-medium rounded-md text-[#64748b] px-7 py-2">Rejected</button>
        </div>
    </main>
</body>

</html>
